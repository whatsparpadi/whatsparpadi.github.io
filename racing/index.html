    <!-- We inject a small script to force the category filter on page load for the racing folder -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Wait a brief moment for search.js to initialize
            setTimeout(() => {
                const categoryFilter = document.getElementById('category-filter');
                if (categoryFilter) {
                    // Temporarily add Racing to the dropdown if it's not dynamically populated yet
                    let hasOption = Array.from(categoryFilter.options).some(opt => opt.value === 'Racing');
                    if (!hasOption) {
                        const option = document.createElement('option');
                        option.value = 'Racing';
                        option.textContent = 'Racing';
                        categoryFilter.appendChild(option);
                    }
                    categoryFilter.value = 'Racing';
                    // Trigger the change event to filter the grid
                    categoryFilter.dispatchEvent(new Event('change'));
                }
            }, 100);
        });
    </script>
